<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>基金公司投资申报系统</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">本地申报工作台</p>
        <h1>基金公司投资申报系统</h1>
        <div class="status" aria-live="polite">
          <span id="status-dot" class="status-dot status-dot--checking"></span>
          <span id="status-text">正在检查后端服务</span>
        </div>

        <form id="debug-file-form" class="debug-file-form">
          <h2>文件分流 / OCR / PDF 读取调试</h2>
          <label>
            选择文件
            <input id="debug-file" name="file" type="file" />
          </label>
          <button type="submit">测试文件分流和内容提取</button>
          <pre id="debug-file-result" class="case-result" aria-live="polite"></pre>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
